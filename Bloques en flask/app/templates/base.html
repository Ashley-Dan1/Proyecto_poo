<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POO Academy - Curso de Python Interactivo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top py-3">
        <div class="container">
            <a class="navbar-brand navbar-brand-custom" href="/">
                <i class="bi bi-terminal-box text-primary me-2"></i>POO <span>Academy</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navPrincipal">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navPrincipal">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 gap-2">
                    <li class="nav-item">
                        <a class="nav-link text-white" href="/"><i class="bi bi-house-door me-1"></i>Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="/ejercicios"><i class="bi bi-grid-3x3-gap me-1"></i>Bloques</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="/acerca-de"><i class="bi bi-info-circle me-1"></i>Acerca de</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link btn btn-sm btn-outline-light px-3 ms-2" href="https://github.com" target="_blank">
                            <i class="bi bi-github me-1"></i>GitHub
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="flex-grow-1">
        {% block contenido %}{% endblock %}
    </div>

    <footer class="footer-custom py-5 mt-5">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-6 text-center text-md-start mb-3 mb-md-0">
                    <h5>POO Academy &copy; 2026</h5>
                    <p class="small mb-0 text-muted">Aprende Programación Orientada a Objetos mediante experimentación empírica en tiempo real.</p>
                </div>
                <div class="col-md-6 text-center text-md-end">
                    <span class="badge bg-secondary me-2">Versión 2.0.26</span>
                    <span class="badge bg-dark border border-secondary text-muted">Python + Flask + Bootstrap</span>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
