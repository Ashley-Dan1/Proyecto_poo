{% extends 'base.html' %}
{% block contenido %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="tarjeta-educativa p-4 bg-white">
                <h3 class="fw-bold mb-3 text-center text-dark"><i class="bi bi-shield-lock text-primary me-2"></i>Iniciar Sesión</h3>
                
                {% with messages = get_flashed_messages(with_categories=true) %}
                  {% if messages %}
                    {% for category, message in messages %}
                      <div class="alert alert-{{ category }} py-2 small border-0 text-center" role="alert">
                        {{ message }}
                      </div>
                    {% endfor %}
                  {% endif %}
                {% endwith %}

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">Email institucional</label>
                        <input type="email" class="form-control" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">Contraseña</label>
                        <input type="password" class="form-control" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold py-2 mt-2">Entrar al Portal</button>
                </form>
                <div class="text-center mt-3 small">
                    <a href="/registro" class="text-decoration-none">¿No tienes cuenta? Regístrate aquí</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
